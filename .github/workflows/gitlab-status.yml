name: Check GitLab CI Status

on:
  pull_request:
  push:

jobs:
  check-gitlab:
    runs-on: ubuntu-latest
    steps:
      - name: Get GitLab pipeline status
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_READ_API }}
          GITLAB_PROJECT_ID: <27200>
          GITLAB_REF: ${{ github.sha }}
        run: |
          if [ -z "$GITLAB_TOKEN" ]; then
            AUTH_HEADER=""
          else
            AUTH_HEADER="--header 'PRIVATE-TOKEN: $GITLAB_TOKEN'"
          fi
          PIPELINE_JSON=$(eval curl --silent $AUTH_HEADER \
            "https://gricad-gitlab.univ-grenoble-alpes.fr/api/v4/projects/$GITLAB_PROJECT_ID/pipelines?sha=$GITLAB_REF")
          STATUS=$(echo "$PIPELINE_JSON" | jq -r '.[0].status')
          PIPELINE_ID=$(echo "$PIPELINE_JSON" | jq -r '.[0].id')
          PIPELINE_URL="https://gricad-gitlab.univ-grenoble-alpes.fr/on-dem/model-data/-/pipelines/$PIPELINE_ID"
          echo "GitLab pipeline status: $STATUS"
          if [ "$STATUS" = "success" ]; then
            echo "::notice::GitLab pipeline succeeded! ($PIPELINE_URL)"
          else
            echo "::error::GitLab pipeline failed or is not finished. See details: $PIPELINE_URL"
            exit 1
          fi
